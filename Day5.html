<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telephone Input Example</title>
</head>
<body>
  <h2>Telephone Input Example</h2>
  <form action="/submit" method="post">
    <!-- Input type tel with all attributes -->
    <label for="phone1">Phone Number:</label>
    <input 
      type="tel" 
      id="phone1" 
      name="phone" 
      placeholder="+91-9876543210" 
      required 
      maxlength="15" 
      minlength="10" 
      size="20" 
      autocomplete="tel" 
      value="+91-" 
    >
    <br><br>
    <input type="submit" value="Submit">
  </form>
</body>
</html>
