<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Application Registration Form</title>
</head>
<body bgcolor="lightgrey">
  <center>
    <h2>Job Application Registration Form</h2>
    <form>
      <table cellpadding="8" cellspacing="0" bgcolor="white">
        <tr>
          <td><label for="fname">First Name:</label></td>
          <td><input type="text" id="fname" name="fname" required></td>
        </tr>
        <tr>
          <td><label for="lname">Last Name:</label></td>
          <td><input type="text" id="lname" name="lname" required></td>
        </tr>
        <tr>
          <td><label for="email">Email:</label></td>
          <td><input type="email" id="email" name="email" required></td>
        </tr>
        <tr>
          <td><label for="password">Password:</label></td>
          <td><input type="password" id="password" name="password" required></td>
        </tr>
        <tr>
          <td><label for="dob">Date of Birth:</label></td>
          <td><input type="date" id="dob" name="dob"></td>
        </tr>
        <tr>
          <td>Gender:</td>
          <td>
            <input type="radio" id="male" name="gender" value="Male">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="Other">
            <label for="other">Other</label>
          </td>
        </tr>
        <tr>
          <td><label for="phone">Phone Number:</label></td>
          <td><input type="tel" id="phone" name="phone"></td>
        </tr>
        <tr>
          <td><label for="resume">Upload Resume:</label></td>
          <td><input type="file" id="resume" name="resume"></td>
        </tr>
        <tr>
          <td><label for="position">Position Applied:</label></td>
          <td>
            <select id="position" name="position">
              <option value="">Select Position</option>
              <option value="developer">Developer</option>
              <option value="designer">Designer</option>
              <option value="manager">Manager</option>
              <option value="analyst">Analyst</option>
            </select>
          </td>
        </tr>
        <tr>
          <td><label for="experience">Years of Experience:</label></td>
          <td><input type="number" id="experience" name="experience" min="0" max="40"></td>
        </tr>
        <tr>
          <td>Skills:</td>
          <td>
            <input type="checkbox" id="html" name="skills" value="HTML">
            <label for="html">HTML</label>
            <input type="checkbox" id="css" name="skills" value="CSS">
            <label for="css">CSS</label>
            <input type="checkbox" id="js" name="skills" value="JavaScript">
            <label for="js">JavaScript</label>
            <input type="checkbox" id="python" name="skills" value="Python">
            <label for="python">Python</label>
          </td>
        </tr>
        <tr>
          <td><label for="salary">Expected Salary:</label></td>
          <td><input type="range" id="salary" name="salary" min="20000" max="200000" step="5000"></td>
        </tr>
        <tr>
          <td><label for="address">Address:</label></td>
          <td><textarea id="address" name="address" rows="3"></textarea></td>
        </tr>
        <tr>
          <td colspan="2">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms">I agree to the terms and conditions</label>
          </td>
        </tr>
        <tr>
          <td colspan="2" align="center">
            <input type="submit" value="Submit Application">
            <input type="reset" value="Reset Form">
          </td>
        </tr>
      </table>
    </form>
  </center>
</body>
</html>
