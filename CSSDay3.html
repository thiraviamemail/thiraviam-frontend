<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coloring systems</title>
</head>
<body>
    <p style="background-color: rgb(21, 255, 0);">RGB</p>
    <p style="background-color: rgba(105, 17, 221, 0.842);">RGBA</p>

    <p style="background-color: hsl(41, 81%, 48%);">HSL</p>
    <p style="background-color: hsla(327, 90%, 52%, 0.836);">HSLA</p>

    <p style="background-color: #12cbd8;">HEX</p>
    <p style="background-color: #12cbd867;">HEXA</p>

    <p style="cursor: zoom-in;">Zoom in</p>
    <p style="cursor: zoom-out;">zoom out</p>
    <p style="cursor: wait;">wait</p>
    <p style="cursor: crosshair;">crosshair</p>
    <p style="cursor: help;">help</p>
    <p style="cursor: pointer;">pointer</p>
    <p style="cursor: progress;">progress</p>

</body>
</html>
